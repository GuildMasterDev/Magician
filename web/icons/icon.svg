<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffed4b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Soft purple radial halo -->
  <circle cx="256" cy="240" r="200" fill="url(#purple)" opacity="0.22"/>

  <!-- Stars (sparkles) -->
  <g fill="url(#gold)" filter="url(#glow)">
    <path d="M 110 120 l 6 -22 l 6 22 l 22 6 l -22 6 l -6 22 l -6 -22 l -22 -6 z"/>
    <path d="M 420 155 l 5 -18 l 5 18 l 18 5 l -18 5 l -5 18 l -5 -18 l -18 -5 z"/>
    <path d="M 400 400 l 4 -14 l 4 14 l 14 4 l -14 4 l -4 14 l -4 -14 l -14 -4 z"/>
    <path d="M 90 380 l 4 -14 l 4 14 l 14 4 l -14 4 l -4 14 l -4 -14 l -14 -4 z"/>
  </g>

  <!-- Top hat -->
  <g transform="translate(256 290)">
    <!-- Brim -->
    <ellipse cx="0" cy="80" rx="160" ry="22" fill="#0a0a0f" stroke="url(#gold)" stroke-width="4"/>
    <!-- Crown -->
    <rect x="-90" y="-90" width="180" height="170" rx="10" fill="#0a0a0f" stroke="url(#gold)" stroke-width="4"/>
    <!-- Band -->
    <rect x="-90" y="55" width="180" height="20" fill="url(#purple)"/>
    <!-- Star on band -->
    <path d="M 0 55 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 l 12 -4 z" fill="url(#gold)" transform="translate(0 10)"/>
    <!-- Highlight -->
    <rect x="-84" y="-84" width="10" height="130" rx="5" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- Wand crossing -->
  <g transform="translate(256 290) rotate(35)" filter="url(#glow)">
    <rect x="-6" y="-230" width="12" height="220" rx="4" fill="#1a0a2e" stroke="url(#gold)" stroke-width="3"/>
    <rect x="-6" y="-230" width="12" height="30" rx="4" fill="url(#gold)"/>
    <rect x="-6" y="-40" width="12" height="30" rx="4" fill="url(#gold)"/>
  </g>
</svg>
